<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Creathon 2026 Admin Panel – View, manage, and export team registrations.">
    <title>Admin Panel | Creathon 2026</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.6)',
                        glassStrong: 'rgba(255, 255, 255, 0.85)',
                        glassCard: 'rgba(255, 255, 255, 0.5)',
                        glassBorder: 'rgba(255, 255, 255, 0.7)',
                        primaryBlue: '#2563eb',
                        primaryPurple: '#7c3aed',
                        primaryCyan: '#0891b2',
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px rgba(37, 99, 235, 0.1)',
                        'glowBlue': '0 0 20px rgba(37, 99, 235, 0.3)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 text-slate-800 font-sans antialiased overflow-x-hidden relative min-h-screen flex flex-col selection:bg-primaryBlue selection:text-white">

    <!-- Global 3D Canvas Background -->
    <canvas id="hero-canvas"
        class="fixed inset-0 w-full h-full z-0 pointer-events-none opacity-60 mix-blend-multiply"></canvas>

    <!-- Light Mesh Overlay for texture -->
    <div
        class="fixed inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMzcsOTksMjM1LDAuMDUpIi8+PC9zdmc+')] pointer-events-none z-0">
    </div>

    <!-- Navigation -->
    <nav id="navbar"
        class="bg-white/80 border-b border-white backdrop-blur-xl py-4 sticky top-0 z-50 shadow-glass w-full relative">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-bold tracking-wider group">
                <span
                    class="text-3xl drop-shadow-[0_0_10px_rgba(37,99,235,0.4)] filter group-hover:animate-spin">⚛</span>
                <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 font-extrabold uppercase tracking-widest">CREATHON</span>
            </a>
            <div>
                <a href="index.html"
                    class="px-5 py-2 rounded-full border border-gray-200 bg-white text-slate-600 font-bold text-sm hover:border-blue-400 hover:text-blue-600 transition-colors shadow-sm uppercase tracking-widest">←
                    Back to Site</a>
            </div>
        </div>
    </nav>

    <!-- Wrap main content over the 3D canvas -->
    <div class="relative z-10 w-full flex-1 flex flex-col">

        <!-- Login Section -->
        <div id="login-section" class="flex-1 flex items-center justify-center p-4 md:p-6 w-full max-w-sm mx-auto">
            <div
                class="w-full bg-white/70 border border-white rounded-3xl md:rounded-[2rem] p-6 md:p-10 text-center backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/5 to-transparent pointer-events-none"></div>
                <span class="text-5xl block mb-6 filter drop-shadow-[0_0_10px_rgba(37,99,235,0.2)]">🔒</span>
                <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Admin Login</h2>
                <p class="text-sm font-bold text-slate-500 mb-8 uppercase tracking-widest">Manage Registrations</p>

                <form id="login-form" class="space-y-5 text-left relative z-10">
                    <div>
                        <label for="admin-email"
                            class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Email</label>
                        <input type="email" id="admin-email" required placeholder="admin@example.com"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-inner">
                    </div>
                    <div>
                        <label for="admin-password"
                            class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Password</label>
                        <input type="password" id="admin-password" required placeholder="Enter password"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-inner">
                    </div>
                    <p id="login-error"
                        class="text-red-500 text-sm hidden font-bold mt-2 bg-red-50 px-3 py-2 rounded-lg"></p>
                    <button type="submit"
                        class="w-full mt-6 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-black uppercase tracking-[0.2em] text-sm rounded-full py-4 shadow-glowBlue transition-all transform hover:-translate-y-1">
                        Sign In
                    </button>
                </form>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden flex-1 w-full max-w-7xl mx-auto px-6 py-12 flex-col">
            <div
                class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 pb-6 border-b border-gray-200">
                <div>
                    <h1 class="text-3xl md:text-5xl font-black text-slate-800 flex items-center gap-3 tracking-tight">
                        <span class="text-blue-600">📊</span> Admin Dashboard
                    </h1>
                    <p class="text-slate-500 mt-3 font-bold tracking-[0.2em] uppercase text-sm">Creathon 2026 Live
                        Registrations</p>
                </div>

                <div class="flex flex-wrap gap-4">
                    <button id="export-excel-btn"
                        class="flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-6 py-3 rounded-full font-black text-sm uppercase tracking-widest shadow-[0_5px_15px_rgba(16,185,129,0.3)] transition-transform transform hover:-translate-y-1">
                        <span>📊</span> Export Excel
                    </button>
                    <button id="export-csv-btn"
                        class="flex items-center gap-2 bg-white/80 border border-slate-200 hover:border-slate-300 text-slate-700 px-6 py-3 rounded-full font-black text-sm uppercase tracking-widest shadow-sm hover:shadow transition-all">
                        <span>📥</span> Export CSV
                    </button>
                    <button id="refresh-btn"
                        class="flex items-center gap-2 bg-white/80 border border-slate-200 hover:border-blue-400 hover:text-blue-600 text-slate-700 px-6 py-3 rounded-full font-black text-sm uppercase tracking-widest shadow-sm hover:shadow transition-all">
                        <span>🔄</span> Refresh
                    </button>
                    <button id="logout-btn"
                        class="flex items-center gap-2 bg-red-50 border border-red-200 hover:bg-red-100 text-red-600 px-6 py-3 rounded-full font-black text-sm uppercase tracking-widest shadow-sm transition-all">
                        Logout
                    </button>
                </div>
            </div>

            <div id="stats-row" class="grid grid-cols-1 sm:grid-cols-3 gap-6 md:gap-8 mb-10 w-full">
                <!-- Stat 1 -->
                <div
                    class="bg-white/70 border border-white rounded-[2rem] p-6 md:p-8 text-center backdrop-blur-xl shadow-glass flex flex-col justify-center relative overflow-hidden group hover:-translate-y-1 transition-transform">
                    <div
                        class="absolute -top-10 -right-10 w-24 h-24 md:w-32 md:h-32 bg-blue-100 rounded-full blur-3xl transition-colors group-hover:bg-blue-200">
                    </div>
                    <div class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500 mb-2 md:mb-3"
                        id="stat-teams">0</div>
                    <div class="text-xs md:text-sm uppercase tracking-[0.2em] text-slate-500 font-bold">Total Teams
                    </div>
                </div>
                <!-- Stat 2 -->
                <div
                    class="bg-white/70 border border-white rounded-[2rem] p-6 md:p-8 text-center backdrop-blur-xl shadow-glass flex flex-col justify-center relative overflow-hidden group hover:-translate-y-1 transition-transform">
                    <div
                        class="absolute -top-10 -right-10 w-24 h-24 md:w-32 md:h-32 bg-cyan-100 rounded-full blur-3xl transition-colors group-hover:bg-cyan-200">
                    </div>
                    <div class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-teal-500 mb-2 md:mb-3"
                        id="stat-participants">0</div>
                    <div class="text-xs md:text-sm uppercase tracking-[0.2em] text-slate-500 font-bold">Participants
                    </div>
                </div>
                <!-- Stat 3 -->
                <div
                    class="bg-white/70 border border-white rounded-[2rem] p-6 md:p-8 text-center backdrop-blur-xl shadow-glass flex flex-col justify-center relative overflow-hidden group hover:-translate-y-1 transition-transform">
                    <div
                        class="absolute -top-10 -right-10 w-24 h-24 md:w-32 md:h-32 bg-purple-100 rounded-full blur-3xl transition-colors group-hover:bg-purple-200">
                    </div>
                    <div class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500 mb-2 md:mb-3"
                        id="stat-sections">0</div>
                    <div class="text-xs md:text-sm uppercase tracking-[0.2em] text-slate-500 font-bold">Sections</div>
                </div>
            </div>

            <!-- Table Wrapper -->
            <div
                class="bg-white/80 border border-white rounded-[2rem] overflow-hidden backdrop-blur-2xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] flex-1 flex flex-col relative z-20">
                <div class="overflow-x-auto flex-1 h-full">
                    <table class="w-full text-left border-collapse whitespace-nowrap table-auto">
                        <thead>
                            <tr
                                class="bg-slate-100/80 border-b border-gray-200 text-xs uppercase tracking-widest text-slate-500 font-black">
                                <th class="px-6 py-5">Team Name</th>
                                <th class="px-6 py-5">Role</th>
                                <th class="px-6 py-5">Name</th>
                                <th class="px-6 py-5">Roll No</th>
                                <th class="px-6 py-5">Year</th>
                                <th class="px-6 py-5">Section</th>
                                <th class="px-6 py-5">Email</th>
                                <th class="px-6 py-5">Registered At</th>
                                <th class="px-6 py-5 text-right flex items-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="registrations-body"
                            class="text-sm font-bold text-slate-700 divide-y divide-gray-100">
                            <tr>
                                <td colspan="9"
                                    class="text-center py-16 text-slate-400 font-bold uppercase tracking-widest flex items-center justify-center gap-3">
                                    <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg"
                                        fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    Loading live registrations...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div> <!-- End Content Wrapper -->

    <!-- Toast -->
    <div id="toast"
        class="fixed bottom-6 right-6 px-8 py-5 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] font-black tracking-widest uppercase text-sm transform translate-y-[200%] transition-transform duration-300 z-[100] bg-white border border-slate-200 text-slate-800 hidden">
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <!-- Keep Firebase just for the Admin User Authentication login -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="supabase-setup.js"></script>
    <!-- Use local scripts -->
    <script src="script.js"></script>
    <script src="admin.js"></script>

</body>

</html>
